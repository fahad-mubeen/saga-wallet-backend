dataSources:
  shardwallet1:
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet1?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: $${shardwallet1_DB_PASSWORD::}
    driverClassName: com.mysql.cj.jdbc.Driver
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource

  shardwallet2:
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet2?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: $${shardwallet2_DB_PASSWORD::}
    driverClassName: com.mysql.cj.jdbc.Driver
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource

rules:
  - !SHARDING
    defaultDatabaseStrategy:
      standard:
        shardingColumn: id
        shardingAlgorithmName: db-inline
    tables:
      users:
        actualDataNodes: shardwallet${1..2}.users
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakeStrategy
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
      transactions:
        actualDataNodes: shardwallet${1..2}.transactions
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakeStrategy
      wallets:
        actualDataNodes: shardwallet${1..2}.wallets
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakeStrategy
      saga_step:
        actualDataNodes: shardwallet${1..2}.saga_step
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakeStrategy
      saga_instance:
        actualDataNodes: shardwallet${1..2}.saga_instance
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db-inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakeStrategy

    shardingAlgorithms:
        db-inline:
            type: INLINE
            props:
              algorithm-expression: shardwallet${id % 2 + 1}
        db-inline-user-id:
            type: INLINE
            props:
              algorithm-expression: shardwallet${user_id % 2 + 1}
    keyGenerators:
      snowflakeStrategy:
        type: SNOWFLAKE

# ===================================================================================
# FUTURE ENHANCEMENT: Secondary Index Problem (Login Optimization)
# Currently, sharding by 'id' causes "Full Route" queries when logging in via 'username'.
#
# Solution: The Mapping (Lookup) Table Pattern
# 1. How it works: Create a separate table (e.g., user_mapping) with (username, user_id).
# 2. Strategy: Shard the 'user_mapping' table by 'username'.
# 3. Login Flow:
#    - Query user_mapping by 'username' to retrieve the 'user_id' (Hits 1 shard).
#    - Use 'user_id' to query the main sharded 'users' table (Hits 1 shard).
# ===================================================================================